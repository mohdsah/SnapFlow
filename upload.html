<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Upload | SKYNET</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-header">
    <button onclick="history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
    <h1 style="font-family:var(--font);font-size:17px;font-weight:800;flex:1;text-align:center;">Kongsi Video</h1>
    <div style="width:36px;"></div>
  </header>

  <main class="page" style="padding-top:12px;">

    <!-- Preview Box -->
    <div class="upload-box" id="upload-box" onclick="document.getElementById('file-input').click()">
      <img id="preview-img" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:var(--radius);">
      <video id="preview-vid" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:var(--radius);" loop muted autoplay playsinline></video>
      <div id="placeholder-content" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
        <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
        <div class="upload-text">Ketik untuk pilih video atau gambar<br><span style="color:var(--text3);font-size:12px;">MP4, MOV, JPG, PNG · Max 100MB</span></div>
      </div>
    </div>

    <input type="file" id="file-input" accept="image/*,video/*" hidden onchange="previewFile(event)">

    <!-- Change file button (shown after select) -->
    <button id="change-file-btn" onclick="document.getElementById('file-input').click()" style="display:none;width:100%;padding:9px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;color:var(--text2);cursor:pointer;margin-top:8px;">
      <i class="fa-solid fa-arrow-rotate-right" style="margin-right:6px;"></i>Tukar Fail
    </button>

    <!-- Filter Section -->
    <div id="filter-section" style="display:none;margin-top:16px;">
      <p style="font-size:12px;font-weight:600;color:var(--text3);font-family:var(--font);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Filter</p>
      <div class="chip-row" style="padding:0;gap:6px;overflow-x:auto;">
        <button class="chip active" onclick="applyFilter('none',this)">Asal</button>
        <button class="chip" onclick="applyFilter('brightness(1.15) contrast(1.1)',this)">Cerah</button>
        <button class="chip" onclick="applyFilter('grayscale(1)',this)">B&amp;W</button>
        <button class="chip" onclick="applyFilter('sepia(0.7)',this)">Sepia</button>
        <button class="chip" onclick="applyFilter('hue-rotate(180deg)',this)">Neon</button>
        <button class="chip" onclick="applyFilter('saturate(2)',this)">Vivid</button>
        <button class="chip" onclick="applyFilter('contrast(1.3) brightness(0.9)',this)">Drama</button>
      </div>
    </div>

    <!-- Compress Toggle -->
    <div id="compress-wrap" style="display:none;margin-top:14px;padding:12px 14px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div>
        <p style="font-family:var(--font);font-size:13px;font-weight:700;margin-bottom:2px;">Mampatkan Video</p>
        <p id="compress-status" style="font-size:11px;color:var(--text3);">Jimat ruang storan</p>
      </div>
      <label style="position:relative;width:44px;height:24px;flex-shrink:0;">
        <input type="checkbox" id="compress-toggle" onchange="toggleCompress(this)" style="opacity:0;width:0;height:0;">
        <span id="compress-slider" style="position:absolute;inset:0;background:var(--border2);border-radius:12px;cursor:pointer;transition:background 0.2s;">
          <span style="position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s;"></span>
        </span>
      </label>
    </div>

    <!-- Caption -->
    <div class="input-wrap" style="margin-top:14px;">
      <label>Kapsyen</label>
      <textarea id="video-caption" class="sn-input" rows="3" placeholder="Cerita tentang video anda..." style="resize:none;"></textarea>
    </div>

    <!-- AI Caption -->
    <button id="ai-caption-btn" onclick="generateAICaption()" disabled style="width:100%;padding:10px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);border-radius:var(--radius-sm);color:#a78bfa;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;opacity:0.5;">
      <i class="fa-solid fa-wand-magic-sparkles" style="margin-right:6px;"></i>Jana Kapsyen AI
    </button>

    <!-- Hashtag -->
    <div class="input-wrap">
      <label>Tanda Pagar (Hashtag)</label>
      <input id="hashtag-input" class="sn-input" type="text" placeholder="#viral #fyp #skynet" style="font-size:14px;">
    </div>

    <!-- Schedule -->
    <div style="padding:12px 14px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:14px;">
      <div class="flex-between" style="margin-bottom:10px;">
        <div>
          <p style="font-family:var(--font);font-size:13px;font-weight:700;">Jadual Publish</p>
          <p style="font-size:11px;color:var(--text3);margin-top:2px;">Kosong = publish sekarang</p>
        </div>
        <i class="fa-regular fa-calendar" style="color:var(--text3);font-size:18px;"></i>
      </div>
      <input type="datetime-local" id="schedule-datetime" class="sn-input" style="font-size:14px;">
    </div>

    <!-- Draft Toggle -->
    <div style="padding:12px 14px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div>
        <p style="font-family:var(--font);font-size:13px;font-weight:700;">Simpan Sebagai Draf</p>
        <p style="font-size:11px;color:var(--text3);margin-top:2px;">Tidak akan publish automatik</p>
      </div>
      <label style="position:relative;width:44px;height:24px;flex-shrink:0;">
        <input type="checkbox" id="draft-toggle" onchange="toggleDraftMode(this)" style="opacity:0;width:0;height:0;">
        <span id="draft-slider" style="position:absolute;inset:0;background:var(--border2);border-radius:12px;cursor:pointer;transition:background 0.2s;">
          <span style="position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s;"></span>
        </span>
      </label>
    </div>

    <!-- Upload Button -->
    <button id="upload-btn" onclick="startUpload()" class="btn-primary" style="margin-bottom:12px;">
      <i class="fa-solid fa-share-nodes" style="margin-right:8px;"></i>Kongsi Sekarang
    </button>

    <!-- Load Draft -->
    <button onclick="loadDrafts()" class="btn-secondary">
      <i class="fa-solid fa-floppy-disk" style="margin-right:6px;"></i>Muatkan Draf
    </button>

  </main>

  <script src="app.js"></script>
  <script>
    // Init datetime min
    document.addEventListener('DOMContentLoaded', function() {
      const dt = document.getElementById('schedule-datetime');
      if (dt) {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        dt.min = now.toISOString().slice(0,16);
      }
      // Enable AI caption on file select
      document.getElementById('file-input')?.addEventListener('change', function() {
        const btn = document.getElementById('ai-caption-btn');
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
        document.getElementById('change-file-btn').style.display = 'block';
        document.getElementById('compress-wrap').style.display = 'flex';
      });
    });

    function toggleDraftMode(toggle) {
      const slider = document.getElementById('draft-slider');
      const thumb  = slider?.querySelector('span');
      const uploadBtn = document.getElementById('upload-btn');
      const scheduleInput = document.getElementById('schedule-datetime');
      if (slider) slider.style.background = toggle.checked ? 'var(--accent)' : 'var(--border2)';
      if (thumb)  thumb.style.left = toggle.checked ? '23px' : '3px';
      if (scheduleInput) { scheduleInput.disabled = toggle.checked; scheduleInput.style.opacity = toggle.checked ? '0.4' : '1'; }
      if (uploadBtn) uploadBtn.innerHTML = toggle.checked
        ? '<i class="fa-solid fa-floppy-disk" style="margin-right:8px;"></i>Simpan Draf'
        : '<i class="fa-solid fa-share-nodes" style="margin-right:8px;"></i>Kongsi Sekarang';
    }

    function toggleCompress(toggle) {
      const slider = document.getElementById('compress-slider');
      const thumb  = slider?.querySelector('span');
      if (slider) slider.style.background = toggle.checked ? 'var(--accent2)' : 'var(--border2)';
      if (thumb)  thumb.style.left = toggle.checked ? '23px' : '3px';
      compressEnabled = toggle.checked;
      const file = document.getElementById('file-input')?.files?.[0];
      const sizeMB = file ? (file.size/1024/1024).toFixed(1) : '?';
      const status = document.getElementById('compress-status');
      if (status) status.innerText = toggle.checked ? `Aktif — jimat ~40% dari ${sizeMB}MB` : `Tidak aktif — ${sizeMB}MB`;
    }

    function applyFilter(filter, btn) {
      currentFilter = filter;
      const vid = document.getElementById('preview-vid');
      const img = document.getElementById('preview-img');
      if (vid) vid.style.filter = filter === 'none' ? '' : filter;
      if (img) img.style.filter = filter === 'none' ? '' : filter;
      document.querySelectorAll('#filter-section .chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
    }

    function loadDrafts() {
      const drafts = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key?.startsWith('skynet_draft_')) {
          try { drafts.push({ key, ...JSON.parse(localStorage.getItem(key)) }); } catch {}
        }
      }
      if (drafts.length === 0) return showToast('Tiada draf tersimpan.', 'info');
      showToast(`${drafts.length} draf dijumpai. Pilih dalam galeri anda.`, 'info');
    }
  </script>
</body>
</html>
