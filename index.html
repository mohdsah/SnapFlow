<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SKYNET">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=SN&background=fe2c55&color=fff&size=192&bold=true">
  <title>SKYNET</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="feed-tabs">
      <button class="feed-tab" onclick="switchTab('mengikuti',this)">Mengikuti</button>
      <span style="font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,#fe2c55,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px;padding:0 6px;">SKYNET</span>
      <button class="feed-tab active" id="tab-untukanda" onclick="switchTab('untukanda',this)">Untuk Anda</button>
    </div>
    <button onclick="toggleSearch()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:6px;flex-shrink:0;">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
  </header>

  <!-- Live Bar -->
  <div id="live-bar" class="live-bar"></div>

  <!-- Search Overlay -->
  <div id="search-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:300;padding:16px;">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;">
      <div class="search-bar" style="flex:1;">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="search-input" type="search" placeholder="Cari video, kreator..." autofocus>
      </div>
      <button onclick="toggleSearch()" style="background:none;border:none;color:var(--text2);font-size:16px;padding:8px;cursor:pointer;">Batal</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Feed -->
  <div id="video-feed"></div>

  <!-- Comment Panel -->
  <div class="comment-panel" id="comment-panel">
    <div class="comment-backdrop" onclick="closeComments()"></div>
    <div class="comment-sheet">
      <div style="padding:10px 16px 8px;border-bottom:1px solid var(--border);">
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-family:var(--font);font-size:15px;font-weight:800;">Komen <span id="comment-count" style="color:var(--text3);font-weight:400;font-size:13px;"></span></span>
          <button onclick="closeComments()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <div id="comments-list" class="comment-list"></div>
      <div class="comment-input-row">
        <div id="comment-avatar-mini" style="width:32px;height:32px;border-radius:50%;background:var(--bg4);flex-shrink:0;"></div>
        <input id="comment-input" class="sn-input" style="flex:1;padding:9px 14px;border-radius:50px;font-size:14px;" placeholder="Tambah komen...">
        <button onclick="submitComment()" style="background:var(--accent);border:none;border-radius:50%;width:36px;height:36px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;">
          <i class="fa-solid fa-paper-plane" style="font-size:14px;"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <i class="fa-solid fa-house"></i>
      <span>Utama</span>
    </a>
    <a href="discover.html" class="nav-item">
      <i class="fa-solid fa-compass"></i>
      <span>Jelajah</span>
    </a>
    <a href="upload.html" class="nav-item upload-btn-nav">
      <i class="fa-solid fa-plus"></i>
    </a>
    <a href="inbox.html" class="nav-item">
      <i class="fa-regular fa-bell"></i>
      <span>Notif</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i class="fa-regular fa-user"></i>
      <span>Profil</span>
    </a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
