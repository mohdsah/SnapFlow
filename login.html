<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Log Masuk | SKYNET</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-logo">SKYNET</div>
  <p class="auth-tagline">Platform video kreator #1</p>

  <div class="auth-box">
    <h2 class="auth-title">Log Masuk</h2>

    <div class="input-wrap">
      <label>Emel</label>
      <input id="login-email" class="sn-input" type="email" placeholder="nama@emel.com" autocomplete="email" inputmode="email">
    </div>

    <div class="input-wrap" style="position:relative;">
      <label>Kata Laluan</label>
      <input id="login-password" class="sn-input" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:46px;">
      <button onclick="togglePw('login-password',this)" style="position:absolute;right:14px;bottom:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;">
        <i class="fa-regular fa-eye"></i>
      </button>
    </div>

    <div style="text-align:right;margin:-8px 0 16px;">
      <a href="forgot-password.html" style="font-size:12px;color:var(--text3);font-family:var(--font);">Lupa Kata Laluan?</a>
    </div>

    <button class="btn-primary" onclick="handleLogin()">Log Masuk</button>

    <div class="auth-divider">atau</div>

    <button class="social-btn" onclick="loginWithGoogle()">
      <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G">
      Teruskan dengan Google
    </button>
    <button class="social-btn" onclick="loginWithApple()" style="display:none;" id="apple-btn">
      <i class="fa-brands fa-apple" style="font-size:18px;"></i>
      Teruskan dengan Apple
    </button>

    <div id="email-notis-container"></div>
  </div>

  <div class="auth-footer" style="margin-top:20px;">
    Belum ada akaun? <a href="register.html">Daftar Sekarang</a>
  </div>

  <script src="app.js"></script>
  <script>
    // Show Apple button on iOS
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      document.getElementById('apple-btn').style.display = 'flex';
    }
    // Enter key support
    document.getElementById('login-email')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-password')?.focus();
    });
    document.getElementById('login-password')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText ? '<i class="fa-regular fa-eye"></i>' : '<i class="fa-regular fa-eye-slash"></i>';
    }
  </script>
</body>
</html>
