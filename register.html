<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Daftar | SKYNET</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page" style="justify-content:flex-start;padding-top:40px;">

  <div class="auth-logo">SKYNET</div>
  <p class="auth-tagline">Mulakan perjalanan kreator anda</p>

  <div class="auth-box">
    <h2 class="auth-title">Daftar Akaun</h2>

    <div class="input-wrap">
      <label>Nama Penuh</label>
      <input id="reg-fullname" class="sn-input" type="text" placeholder="Nama anda" autocomplete="name">
    </div>

    <div class="input-wrap">
      <label>Username</label>
      <div style="position:relative;">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;">@</span>
        <input id="reg-username" class="sn-input" type="text" placeholder="namapengguna" autocomplete="username" style="padding-left:32px;"
          oninput="bersihkanUsername(this); semakUsername(this.value)">
      </div>
      <span id="username-status" style="font-size:11px;margin-top:5px;display:block;font-family:var(--font);"></span>
    </div>

    <div class="input-wrap">
      <label>Emel</label>
      <input id="reg-email" class="sn-input" type="email" placeholder="nama@emel.com" autocomplete="email" inputmode="email">
    </div>

    <div class="input-wrap" style="position:relative;">
      <label>Kata Laluan</label>
      <input id="reg-password" class="sn-input" type="password" placeholder="Min 6 aksara" autocomplete="new-password" style="padding-right:46px;">
      <button onclick="togglePw('reg-password',this)" style="position:absolute;right:14px;bottom:14px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;">
        <i class="fa-regular fa-eye"></i>
      </button>
      <!-- Strength bar -->
      <div id="strength-bar" style="height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;display:none;">
        <div id="strength-fill" style="height:100%;width:0%;transition:width 0.3s,background 0.3s;border-radius:2px;"></div>
      </div>
      <span id="strength-label" style="font-size:10px;color:var(--text3);display:block;margin-top:4px;font-family:var(--font);"></span>
    </div>

    <button class="btn-primary" onclick="handleRegister()">Buat Akaun</button>
  </div>

  <div class="auth-footer" style="margin-top:16px;">
    Sudah ada akaun? <a href="login.html">Log Masuk</a>
  </div>

  <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:12px;padding:0 20px;line-height:1.5;">
    Dengan mendaftar, anda bersetuju dengan <a href="#" style="color:var(--accent);">Terma Penggunaan</a> kami.
  </div>

  <script src="app.js"></script>
  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText ? '<i class="fa-regular fa-eye"></i>' : '<i class="fa-regular fa-eye-slash"></i>';
    }
    // Password strength
    document.getElementById('reg-password')?.addEventListener('input', function() {
      const bar = document.getElementById('strength-bar');
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      if (!this.value) { bar.style.display='none'; label.textContent=''; return; }
      bar.style.display = 'block';
      let score = 0;
      if (this.value.length >= 6) score++;
      if (this.value.length >= 10) score++;
      if (/[A-Z]/.test(this.value)) score++;
      if (/[0-9]/.test(this.value)) score++;
      if (/[^A-Za-z0-9]/.test(this.value)) score++;
      const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
      const labels = ['Sangat Lemah','Lemah','Sederhana','Kuat','Sangat Kuat'];
      fill.style.width = (score*20)+'%';
      fill.style.background = colors[score-1] || '#ef4444';
      label.textContent = labels[score-1] || '';
      label.style.color = colors[score-1] || 'var(--text3)';
    });
  </script>
</body>
</html>
