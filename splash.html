<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>SKYNET</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:0; }
    .splash-logo { font-family:'Outfit',sans-serif;font-size:52px;font-weight:900;background:linear-gradient(135deg,#fe2c55,#00f2ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-2px;animation:popIn 0.6s ease; }
    .splash-tag { font-size:13px;color:#555;margin-top:6px;font-family:'Inter',sans-serif;animation:fadeInUp 0.5s ease 0.2s both; }
    .splash-loader { margin-top:48px;animation:fadeInUp 0.5s ease 0.4s both; }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Inter:wght@400&display=swap');
    @keyframes popIn{0%{transform:scale(0.7);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="splash-logo">SKYNET</div>
  <p class="splash-tag">Platform Video Kreator</p>
  <div class="splash-loader">
    <div style="width:28px;height:28px;border:2.5px solid #1a1a1a;border-top-color:#fe2c55;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
  </div>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      try {
        const { data: { session } } = await snapSupabase.auth.getSession();
        setTimeout(function() {
          if (session) {
            const redirect = sessionStorage.getItem('sn_redirect_after_login') || 'index.html';
            sessionStorage.removeItem('sn_redirect_after_login');
            window.location.replace(redirect);
          } else {
            window.location.replace('login.html');
          }
        }, 1400);
      } catch(e) {
        setTimeout(() => window.location.replace('login.html'), 1600);
      }
    });
  </script>
</body>
</html>
