<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Profil | SKYNET</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span style="font-size:13px;color:var(--text3);" id="display-username">@username</span>
    <span style="flex:1;"></span>
    <button onclick="window.location.href='edit-profile.html'" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:6px;">
      <i class="fa-solid fa-ellipsis"></i>
    </button>
  </header>

  <main style="padding-bottom:calc(var(--nav-height) + var(--safe-bottom) + 8px);">

    <!-- Profile Info -->
    <section class="profile-header">

      <!-- Avatar -->
      <div class="profile-avatar-wrap">
        <div id="profile-avatar" style="width:90px;height:90px;border-radius:50%;border:3px solid transparent;background:var(--bg4) linear-gradient(var(--bg4),var(--bg4)) padding-box;background-size:cover;background-position:center;"></div>
      </div>

      <!-- Name + Badges -->
      <div class="profile-name">
        <span id="display-fullname">Nama</span>
        <span id="verified-badge" style="display:none;" class="verified-icon" title="Akaun Disahkan">
          <i class="fa-solid fa-check"></i>
        </span>
        <span id="pro-badge" style="display:none;" class="pro-badge">PRO</span>
      </div>

      <p class="profile-handle" id="display-handle">@username</p>

      <!-- Bio -->
      <p class="profile-bio" id="display-bio"></p>

      <!-- Bio Links -->
      <div id="bio-links-display" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:0 16px 12px;"></div>

      <!-- Coins -->
      <div id="creator-coins" style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:4px;"></div>
    </section>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="profile-stat" onclick="window.location.href='followers.html'">
        <strong id="following-count">0</strong>
        <span>Mengikuti</span>
      </div>
      <div class="profile-stat" onclick="window.location.href='followers.html?tab=followers'">
        <strong id="followers-count">0</strong>
        <span>Pengikut</span>
      </div>
      <div class="profile-stat">
        <strong id="video-count">0</strong>
        <span>Video</span>
      </div>
      <div class="profile-stat">
        <strong id="total-likes-display">0</strong>
        <span>Suka</span>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="profile-actions">
      <button class="profile-btn primary" onclick="window.location.href='edit-profile.html'">
        <i class="fa-solid fa-pen"></i> Edit Profil
      </button>
      <button class="profile-btn pro" onclick="openProModal()">
        <i class="fa-solid fa-star"></i> PRO
      </button>
      <button class="profile-btn analytics" onclick="window.location.href='analytics.html'">
        <i class="fa-solid fa-chart-line"></i>
      </button>
      <button class="profile-btn" onclick="window.location.href='collections.html'">
        <i class="fa-solid fa-bookmark"></i>
      </button>
      <button class="profile-btn" onclick="window.location.href='orders.html'">
        <i class="fa-solid fa-bag-shopping"></i>
      </button>
      <button class="profile-btn danger" onclick="handleLogout()">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>

    <!-- Video Grid Tabs -->
    <div class="chip-row" style="padding-bottom:4px;">
      <button class="chip active" onclick="switchProfileTab('videos',this)"><i class="fa-solid fa-play"></i> Video</button>
      <button class="chip" onclick="switchProfileTab('saved',this)"><i class="fa-solid fa-bookmark"></i> Simpan</button>
      <button class="chip" onclick="switchProfileTab('liked',this)"><i class="fa-solid fa-heart"></i> Suka</button>
    </div>

    <!-- Video Grid -->
    <div id="profile-video-grid" class="profile-grid"></div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <i class="fa-solid fa-house"></i>
      <span>Utama</span>
    </a>
    <a href="discover.html" class="nav-item">
      <i class="fa-solid fa-compass"></i>
      <span>Jelajah</span>
    </a>
    <a href="upload.html" class="nav-item upload-btn-nav">
      <i class="fa-solid fa-plus"></i>
    </a>
    <a href="inbox.html" class="nav-item">
      <i class="fa-regular fa-bell"></i>
      <span>Notif</span>
    </a>
    <a href="profile.html" class="nav-item active">
      <i class="fa-solid fa-user"></i>
      <span>Profil</span>
    </a>
  </nav>

  <script src="app.js"></script>
  <script>
    function switchProfileTab(tab, el) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      const grid = document.getElementById('profile-video-grid');
      if (tab === 'videos') {
        loadProfileData();
      } else if (tab === 'saved') {
        window.location.href = 'saved.html';
      } else if (tab === 'liked') {
        loadLikedVideos(grid);
      }
    }

    async function loadLikedVideos(grid) {
      grid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px 16px;color:var(--text3);"><div class="loader-spin" style="margin:0 auto 12px;"></div></div>';
      try {
        const user = await getAuthUser();
        if (!user) return;
        const { data } = await snapSupabase
          .from('likes')
          .select('video_id, videos(id, video_url, likes_count)')
          .eq('user_id', user.id)
          .order('created_at', { ascending: false })
          .limit(30);

        if (!data || data.length === 0) {
          grid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px 16px;color:var(--text3);"><i class="fa-solid fa-heart" style="font-size:32px;margin-bottom:10px;display:block;"></i>Belum ada video yang disukai.</div>';
          return;
        }
        grid.innerHTML = data.filter(d => d.videos).map(d => `
          <div class="profile-video-item" onclick="viewVideo(${d.videos.id})">
            <canvas id="thumb-${d.videos.id}" style="width:100%;height:100%;object-fit:cover;display:block;background:#111;"></canvas>
            <div class="profile-video-overlay"><i class="fa-solid fa-heart"></i> ${d.videos.likes_count || 0}</div>
          </div>
        `).join('');
        data.filter(d => d.videos).forEach(d => generateThumbnail(d.videos.video_url, d.videos.id));
      } catch(e) { grid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px;color:var(--text3);">Gagal muatkan.</div>'; }
    }
  </script>
</body>
</html>
